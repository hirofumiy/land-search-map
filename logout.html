<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ログアウト | BatteryLand</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Segoe UI', 'Hiragino Sans', 'Meiryo', sans-serif;
  background: #0f172a;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  color: #f8fafc;
}
.card {
  background: #1e293b;
  border: 1px solid #334155;
  border-radius: 16px;
  padding: 48px 40px;
  text-align: center;
  max-width: 380px;
  width: 90%;
}
.icon { font-size: 48px; margin-bottom: 16px; }
.title { font-size: 20px; font-weight: 700; margin-bottom: 8px; }
.sub { font-size: 14px; color: #94a3b8; margin-bottom: 32px; }
.spinner {
  display: inline-block;
  width: 32px; height: 32px;
  border: 3px solid rgba(255,255,255,0.2);
  border-top-color: #3b82f6;
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="card">
  <div class="icon">🔓</div>
  <div class="title">ログアウト中...</div>
  <div class="sub">セッションを終了しています</div>
  <div class="spinner"></div>
</div>

<script>
(async function() {
  // localStorageをクリア
  localStorage.removeItem('bl_session_token');
  sessionStorage.clear();

  const cfg = window.BATTERYLAND_CONFIG;
  if (cfg && cfg.SUPABASE_URL && cfg.SUPABASE_ANON_KEY) {
    try {
      const { createClient } = supabase;
      const sb = createClient(cfg.SUPABASE_URL, cfg.SUPABASE_ANON_KEY);
      await sb.auth.signOut();
    } catch(e) {
      // エラーでも続行
    }
  }

  // 1秒後にlogin.htmlへ
  setTimeout(() => {
    location.href = 'login.html';
  }, 1000);
})();
</script>
</body>
</html>
